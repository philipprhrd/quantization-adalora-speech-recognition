name: quantization-adalora-env
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.13
  - pip
  - pip:
    # base
    - torch==2.10.0
    - torchcodec==0.10.0

    # model and training
    - transformers==5.2.0
    - accelerate==1.12.0
    - datasets==4.8.3
    - peft==0.18.1
    - jiwer==4.0.0
    - bitsandbytes==0.49.2

    # cpu eval + quantization
    - optimum[onnxruntime]==1.17.1
    - onnx==1.21.0
    - onnxruntime==1.24.4

    # dep
    - numpy==2.4.2
    - python-dotenv==1.2.1
